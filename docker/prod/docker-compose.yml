services:
  db-init:
    image: elyos-app:latest
    command: ['bun', '--filter', '@elyos/database', 'db:init']
    env_file:
      - .env
    networks:
      - elyos_shared
    restart: 'no'

  app:
    image: elyos-app:latest
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.demo.rule=Host(`demo.elyos.hu`)
      - traefik.http.routers.demo.entrypoints=web
      - traefik.http.services.demo.loadbalancer.server.port=3000
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    networks:
      - elyos_shared
    depends_on:
      db-init:
        condition: service_completed_successfully

  demo-reset:
    image: elyos-app:latest
    command: ['sh', '/app/demo-reset-cron.sh']
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    networks:
      - elyos_shared
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure

networks:
  elyos_shared:
    external: true
